<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Generator</title>
  <link rel="stylesheet" href="bmi.css">
</head>

<body>
  <div class="container">
    <img
      src="https://play-lh.googleusercontent.com/-1_5v9OTBtD9XgP1OcsODC0D4KiTuycJvoOv-SxVeTOVEfobGT1q0IG8DkIYBPaVvpmr"
      alt="" class="img">
    <h1>BMI Calculator</h1>
    <form action="">
      <p><label for="height">Height in CM : </label> <input type="text" id="height"
          placeholder="Enter Your Height in Cm"></p>

      <p><label for="weight">weight in KG : </label> <input type="text" id="weight"
          placeholder="Enter Your Height in Kg"></p>
      <button>Calculate</button>
      <div id="results"></div>
      <div class="weight-guide">
        <h3>BMI Weight Guide </h3>
        <p>Under Weight = Less than 18.6</p>
        <p>Normal Range = 18.6 and 24.9</p>
        <p>Over Weight = Greater than 24.9</p>
      </div>
    </form>
  </div>
  <script src="bmi.js"></script>
</body>

</html>
